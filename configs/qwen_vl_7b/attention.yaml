# Qwen2.5-VL-7B attention analysis configuration
defaults:
  - /base
  - _self_

model_name: "${HF_PATH}/Qwen/Qwen2.5-VL-7B-Instruct"
controller_name: "qwen_vl"

controller_config:
  mode: "analysis"
  store_layers:
    - 0
    - 7
    - 14
    - 21
    - 27
  store_type:
    - "self_q"
    - "self_k"

tasks:
  - "visual_text_attention"
  - "sink_detection"
  - "per_layer_stats"

task_configs:
  visual_text_attention:
    top_k: 5
  sink_detection:
    sink_k: 10
  per_layer_stats: {}

max_new_tokens: 128

inputs:
  - name: "single_image_analysis"
    messages:
      - role: "user"
        content:
          - type: "image"
            image: "https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen-VL/assets/demo.jpeg"
          - type: "text"
            text: "Describe this image in detail."
