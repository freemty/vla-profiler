# Qwen2.5-VL-7B profiling configuration
defaults:
  - /base

model_name: "Qwen/Qwen2.5-VL-7B-Instruct"
controller_name: "qwen_vl"

controller_config:
  mode: "profiling"

tasks:
  - "epd_profiling"

num_warmup_runs: 2
num_benchmark_runs: 5
max_new_tokens: 256

inputs:
  - name: "text_only"
    messages:
      - role: "user"
        content:
          - type: "text"
            text: "What is the capital of France? Answer briefly."

  - name: "single_image"
    messages:
      - role: "user"
        content:
          - type: "image"
            image: "https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen-VL/assets/demo.jpeg"
          - type: "text"
            text: "Describe this image in detail."

  - name: "multi_image"
    messages:
      - role: "user"
        content:
          - type: "image"
            image: "https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen-VL/assets/demo.jpeg"
          - type: "image"
            image: "https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen-VL/assets/demo.jpeg"
          - type: "text"
            text: "Compare these two images."
