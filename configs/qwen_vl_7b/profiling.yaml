# Qwen2.5-VL-7B profiling configuration
# Server: xdlab23, GPU: single RTX 5880 Ada
defaults:
  - /base
  - _self_

model_name: "${oc.env:HF_HOME,/data1/ybyang/huggingface}/Qwen/Qwen2.5-VL-7B-Instruct"
controller_name: "qwen_vl"

controller_config:
  mode: "profiling"

tasks:
  - "epd_profiling"
  - "timing_validation"

num_warmup_runs: 15     # bumped from 3 (exp07a audit: GPU power-state bimodality)
num_benchmark_runs: 20  # bumped from 10
max_new_tokens: 128

inputs:
  - name: "text_only"
    messages:
      - role: "user"
        content:
          - type: "text"
            text: "What is the capital of France? Answer briefly."

  - name: "single_image"
    messages:
      - role: "user"
        content:
          - type: "image"
            image: "https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen-VL/assets/demo.jpeg"
          - type: "text"
            text: "Describe this image in detail."

  - name: "multi_image"
    messages:
      - role: "user"
        content:
          - type: "image"
            image: "https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen-VL/assets/demo.jpeg"
          - type: "image"
            image: "https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen-VL/assets/demo.jpeg"
          - type: "text"
            text: "Compare these two images."
