# LingBot-VLA-4B profiling configuration
# Flow VLA: Qwen2.5-VL-3B backbone -> Pi0 flow action head (10 denoise steps)
defaults:
  - /base
  - _self_

model_name: "/data1/ybyang/modelscope/Robbyant/lingbot-vla-4b"
qwen_path: "/data1/ybyang/huggingface/Qwen/Qwen2.5-VL-3B-Instruct"
controller_name: "lingbot_vla"

controller_config:
  mode: "profiling"

tasks:
  - "epd_profiling"

num_warmup_runs: 3
num_benchmark_runs: 10

inputs:
  - name: "single_img_manipulation"
    messages:
      - role: "user"
        content:
          - type: "image"
            image: "https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen-VL/assets/demo.jpeg"
          - type: "text"
            text: "pick up the red cup"
  - name: "multi_view_manipulation"
    messages:
      - role: "user"
        content:
          - type: "image"
            image: "https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen-VL/assets/demo.jpeg"
          - type: "image"
            image: "https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen-VL/assets/demo.jpeg"
          - type: "text"
            text: "pick up the red cup"
