# Pi-Zero profiling configuration
# Backend: open-pi-zero (allenzren/open-pi-zero)
# Flow VLA: SigLIP → Gemma 2B (context, 1x) → Gemma 300M Expert (action, 10x)
defaults:
  - /base
  - _self_

model_name: ""  # empty = random weights (sufficient for profiling latency)
controller_name: "pizero"

controller_config:
  mode: "profiling"

denoise_steps: 10
use_bf16: true

tasks:
  - "epd_profiling"

num_warmup_runs: 3
num_benchmark_runs: 10

inputs:
  - name: "single_camera_224"
    image_shape: [3, 224, 224]
