# Pi-Zero demo reproduction
# Verify: flow denoise produces actions [1, horizon_steps, action_dim]
# Uses random weights — sufficient to verify forward pass correctness
defaults:
  - /base
  - _self_

model_name: ""
controller_name: "pizero"

controller_config:
  mode: "demo"

denoise_steps: 10
use_bf16: true

tasks:
  - "demo_reproduce"

task_configs:
  demo_reproduce:
    model_type: "vla"
    expected:
      action_shape: [1, 4, 7]
      action_ndim: 3
      denoise_steps: 10
      action_clip_value: 1.0

inputs:
  - name: "official_demo"
    image_shape: [3, 224, 224]
