# StarVLA-OFT E/C/A profiling config (exp11b)
# Model: Qwen2.5-VL-3B-Instruct (ViT + Qwen2.5 LLM) + parallel MLP OFT head
# Standing in for Qwen3-VL-4B (incomplete shard on server)
# Paper: arXiv:2604.05014 — LIBERO 96.6% @30K steps, zero latency reporting

defaults:
  - /base
  - _self_

experiment:
  name: "exp11b_starvla_oft_profiling"
  description: "StarVLA-OFT E/C/A breakdown — Qwen3-VL-4B backbone + OFT head"

model:
  name: "StarVLA-OFT"
  type: "vla"
  paradigm: "parallel-mlp-regression"
  repo: "https://github.com/StarVLA/StarVLA"

# Qwen3-VL-4B backbone (StarVLA not strictly required for timing)
model_name: ""
backbone_path: "${oc.env:HF_HOME,/data1/ybyang/huggingface}/Qwen/Qwen2.5-VL-3B-Instruct"
controller_name: "starvla_oft"

controller_config:
  mode: profiling

action_dim: 7
chunk_size: 5

num_warmup_runs: 15
num_benchmark_runs: 20

tasks:
  - epd_profiling

profiling:
  gpu_id: 0
  warmup: 15
  iterations: 20
  phases:
    - encode    # Qwen3 ViT vision encoder
    - context   # Qwen3 4B LLM prefill
    - action    # Parallel MLP OFT head (single forward)

inputs:
  - name: "single_camera_224"
    image_shape: [3, 224, 224]
    seq_len: 300

notes: |
  StarVLA-OFT uses same OFT method as OpenVLA-OFT but with newer backbone:
  - Qwen3-VL-4B (2026) vs Prismatic/Llama-2 7B (2024)
  - LIBERO 96.6% in 30K steps (6x fewer than OpenVLA-OFT's 175K)
  - Paper reports ZERO inference latency numbers

  Key questions:
  1. E/C/A breakdown — 4B backbone vs 7B (exp11a)?
  2. Same OFT head, different backbone → how much does backbone matter?
  3. Qwen3 vs Qwen2.5 (exp03a LingBot-VLA) vision encoder speed?

  Predictions:
  - E: 15-25ms (Qwen3 ViT, similar to Qwen2.5-VL-3B exp03a E=35.7ms but 4B)
  - C: 20-35ms (Qwen3 4B LLM, smaller than Llama-2 7B)
  - A: <1ms (same OFT method as exp11a)
  - Total: 35-60ms (17-28 Hz)
