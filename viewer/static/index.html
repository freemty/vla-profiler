<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 2rem;
            max-width: 960px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #fff;
        }
        .subtitle {
            color: #888;
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }
        th {
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #333;
            color: #888;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #1a1a1a;
        }
        tr:hover td { background: #111; }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-size: 0.75rem;
        }
        .badge-yes { background: #1a3a1a; color: #4ade80; }
        .badge-no { background: #3a1a1a; color: #888; }
        .empty {
            text-align: center;
            padding: 3rem;
            color: #555;
        }
        .loading { color: #555; }
    </style>
</head>
<body>
    <h1>Experiment Viewer</h1>
    <p class="subtitle">Run <code>/new-experiment</code> to create your first experiment.</p>
    <div id="app">
        <p class="loading">Loading experiments...</p>
    </div>
    <script>
        async function loadExperiments() {
            const app = document.getElementById('app');
            try {
                const res = await fetch('/api/experiments');
                const experiments = await res.json();

                if (experiments.length === 0) {
                    app.innerHTML = '<p class="empty">No experiments yet.</p>';
                    return;
                }

                const rows = experiments.map(exp => `
                    <tr>
                        <td><strong>${exp.id}</strong></td>
                        <td><span class="badge ${exp.has_readme ? 'badge-yes' : 'badge-no'}">${exp.has_readme ? 'Yes' : 'No'}</span></td>
                        <td><span class="badge ${exp.has_results ? 'badge-yes' : 'badge-no'}">${exp.has_results ? 'Yes' : 'No'}</span></td>
                    </tr>
                `).join('');

                app.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Experiment</th>
                                <th>README</th>
                                <th>Results</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
            } catch (err) {
                app.innerHTML = '<p class="empty">Failed to load experiments.</p>';
            }
        }
        loadExperiments();
    </script>
</body>
</html>
